<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global BME688 Telemetry Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-slate-900 border-b border-slate-800 p-5 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-emerald-400">📊 BME688 TELEMETRY SYSTEMS</h1>
            <div id="status" class="bg-amber-500/10 text-amber-400 text-xs px-4 py-1.5 rounded-full border border-amber-500/20 font-mono tracking-widest animate-pulse">CONNECTING TO MQTT WORLD BUS...</div>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto p-6 flex-grow grid grid-cols-1 lg:grid-cols-4 gap-6 my-4">
        <div class="lg:col-span-1 flex flex-col gap-4">
            <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 shadow-md">
                <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Temperature</p>
                <h2 id="temp-val" class="text-4xl font-black text-amber-400 mt-2">--.- <span class="text-xl font-normal text-slate-400">°C</span></h2>
            </div>
            <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 shadow-md">
                <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Humidity</p>
                <h2 id="hum-val" class="text-4xl font-black text-cyan-400 mt-2">--.- <span class="text-xl font-normal text-slate-400">%</span></h2>
            </div>
            <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 shadow-md">
                <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Barometric Pressure</p>
                <h2 id="pres-val" class="text-4xl font-black text-emerald-400 mt-2">----.- <span class="text-xl font-normal text-slate-400">hPa</span></h2>
            </div>
        </div>

        <div class="lg:col-span-3 bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-md flex flex-col justify-between min-h-[400px]">
            <h3 class="text-sm font-semibold text-slate-400 tracking-wider mb-4">Real-time Environmental Waveforms (Rolling Data Feed)</h3>
            <div class="relative w-full h-full flex-grow">
                <canvas id="telemetryChart"></canvas>
            </div>
        </div>
    </main>

    <footer class="text-center p-4 text-xs text-slate-600 border-t border-slate-900 bg-slate-950">
        Assignment Workspace | FreeRTOS Dual-Core Matrix Execution | Managed via GitHub Deployment Pipeline
    </footer>

    <script>
        const ctx = document.getElementById('telemetryChart').getContext('2d');
        const statusEl = document.getElementById('status');
        
        const MQTT_BROKER = "broker.hivemq.com";
        const MQTT_PORT = 8001; // WebSocket gateway port for browser tracking
        const MQTT_TOPIC = "amit_bme688_secure_zone_99/data";

        let dataHistory = [];
        const MAX_POINTS = 50;

        // Configuration setup for rendering multiple sensor dimensions
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Temperature (°C)', borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.05)', data: [], borderWidth: 2, tension: 0.2, yAxisID: 'y-temp' },
                    { label: 'Humidity (%)', borderColor: '#22d3ee', backgroundColor: 'rgba(34,211,238,0.05)', data: [], borderWidth: 2, tension: 0.2, yAxisID: 'y-hum' },
                    { label: 'Pressure (hPa)', borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.05)', data: [], borderWidth: 1.5, borderDash: [4, 4], tension: 0.1, yAxisID: 'y-pres' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
                    'y-temp': { type: 'linear', position: 'left', grid: { color: '#1e293b' }, ticks: { color: '#fbbf24' } },
                    'y-hum': { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#22d3ee' } },
                    'y-pres': { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#10b981' }, display: false } // Kept scale calculations scaling implicit
                },
                plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } }
            }
        });

        const clientId = "web-client-" + Math.floor(Math.random() * 100000);
        const client = new Paho.MQTT.Client(MQTT_BROKER, Number(MQTT_PORT), clientId);

        client.onConnectionLost = (responseObj) => {
            statusEl.innerText = "LINK LOSS - RETRYING INSTANTIATION...";
            statusEl.className = "bg-red-500/10 text-red-400 text-xs px-4 py-1.5 rounded-full border border-red-500/20 font-mono tracking-widest";
            setTimeout(connectBroker, 5000);
        };

        client.onMessageArrived = (message) => {
            try {
                const data = JSON.parse(message.payloadString);
                
                if (dataHistory.length >= MAX_POINTS) dataHistory.shift();
                dataHistory.push(data);

                document.getElementById('temp-val').innerHTML = `${data.temperature.toFixed(1)} <span class="text-xl font-normal text-slate-400">°C</span>`;
                document.getElementById('hum-val').innerHTML = `${data.humidity.toFixed(1)} <span class="text-xl font-normal text-slate-400">%</span>`;
                document.getElementById('pres-val').innerHTML = `${data.pressure.toFixed(1)} <span class="text-xl font-normal text-slate-400">hPa</span>`;

                const timeLabel = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                chart.data.labels = dataHistory.map((_, i) => i === dataHistory.length - 1 ? timeLabel : '');
                chart.data.datasets[0].data = dataHistory.map(d => d.temperature);
                chart.data.datasets[1].data = dataHistory.map(d => d.humidity);
                chart.data.datasets[2].data = dataHistory.map(d => d.pressure);
                chart.update('none');

            } catch (e) { console.error("Malformed JSON frame packet drop.", e); }
        };

        function connectBroker() {
            client.connect({
                onSuccess: () => {
                    statusEl.innerText = "GLOBAL TELEMETRY STREAM ACTIVE";
                    statusEl.className = "bg-emerald-500/10 text-emerald-400 text-xs px-4 py-1.5 rounded-full border border-emerald-500/20 font-mono tracking-widest animate-none";
                    client.subscribe(MQTT_TOPIC);
                },
                onFailure: () => { setTimeout(connectBroker, 5000); },
                useSSL: true
            });
        }

        connectBroker();
    </script>
</body>
</html>
